name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        shell: bash
        run: |
          PREV=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          echo "tag=${PREV:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Ditto v__VERSION__"
          releaseBody: "**Full Changelog**: https://github.com/n4yabi12/Ditto/compare/${{ steps.prev_tag.outputs.tag }}...v__VERSION__"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          includeUpdaterJson: false
